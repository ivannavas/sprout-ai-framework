name: Publish to Maven Central

# Publishes the libraries to Maven Central when a GitHub Release is published.
# Can also be triggered manually from the Actions tab.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   MAVEN_CENTRAL_USERNAME   user token name from https://central.sonatype.com (Account -> Generate token)
#   MAVEN_CENTRAL_PASSWORD   user token password
#   MAVEN_GPG_PRIVATE_KEY    ASCII-armored secret key: gpg --armor --export-secret-keys <KEY_ID>
#   MAVEN_GPG_PASSPHRASE     passphrase for that key
#
# The version published is whatever is set in the POMs, so bump <version> (drop -SNAPSHOT) before
# tagging the release.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Publish to Maven Central
        run: mvn --batch-mode --no-transfer-progress -Prelease -DskipTests deploy
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
