# Shared Sprout config for the plain-Java examples (basic, mcp, orchestration).
#
# Note: sprout.scan.base-packages is intentionally NOT set here. A value in this file would
# apply to every example sharing this classpath and override each app's natural per-package
# scan. The basic example passes its scan packages via the `basic` Maven profile instead, and
# the mcp example relies on the default (main-class package) scan.

# Non-secret model config for the basic example. The API key is supplied at runtime via the
# ANTHROPIC_API_KEY env var or -Danthropic.api.key=... (never committed). The empty default lets the
# auto-scanned Anthropic executor and Voyage embedding model wire up even when the key is absent; they
# fail only if actually called (e.g. the stub-backed Spring example never touches them).
anthropic.model.name=claude-sonnet-4-6
anthropic.api.key=${ANTHROPIC_API_KEY:}
voyage.api.key=${VOYAGE_API_KEY:}
